<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Password Reset Success</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- Bootstrap 5 CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Custom CSS -->
    <style>
        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #4f46e5, #7c3aed);
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', sans-serif;
        }

        .success-card {
            background: #ffffff;
            border-radius: 16px;
            padding: 30px;
            width: 100%;
            max-width: 420px;
            text-align: center;
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.15);
        }

        .logo {
            font-weight: 600;
            color: #4f46e5;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
            margin-bottom: 20px;
        }

        .check-icon {
            width: 70px;
            height: 70px;
            background: #22c55e;
            color: white;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 36px;
            margin: 20px auto;
        }

        .btn-primary {
            background-color: #4f46e5;
            border: none;
            padding: 12px;
            font-size: 16px;
            border-radius: 10px;
        }

        .btn-primary:hover {
            background-color: #4338ca;
        }

        .support-text {
            margin-top: 15px;
            font-size: 14px;
        }

        .support-text a {
            color: #4f46e5;
            text-decoration: none;
            font-weight: 500;
        }
    </style>
</head>
<body>

<div class="success-card">
    <div class="logo">
        🔍 <span>Khojne Sathi</span>
    </div>

    <div class="check-icon">
        ✓
    </div>

    <h4 class="fw-bold mt-3">Password Reset Successful!</h4>
    <p class="text-muted mt-2">
        You can now log in using your new password.
        Your account is secure and ready to use.
    </p>

    <a href="login.html" class="btn btn-primary w-100 mt-3">
        Go to Login
    </a>

    <div class="support-text">
        Need help? <a href="#">Contact Support</a>
    </div>
</div>

</body>
</html>
