<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Forgot Password | Khojne Sathi</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <!-- Bootstrap 5 -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- Bootstrap Icons -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">

  <style>
    body {
      min-height: 100vh;
      background: linear-gradient(135deg, #2563eb, #1d4ed8);
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: "Segoe UI", sans-serif;
    }

    .auth-card {
      background: #ffffff;
      width: 100%;
      max-width: 420px;
      padding: 35px;
      border-radius: 14px;
      box-shadow: 0 30px 70px rgba(0,0,0,0.25);
      text-align: center;
    }

    .logo-icon {
      width: 42px;
      height: 42px;
      background: linear-gradient(135deg, #4f46e5, #6366f1);
      color: #fff;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 10px;
      font-size: 20px;
    }

    .brand-name {
      font-weight: 700;
      font-size: 18px;
      margin-bottom: 15px;
    }

    .form-control {
      padding: 12px;
      border-radius: 8px;
      font-size: 14px;
    }

    .btn-primary {
      background: linear-gradient(135deg, #4f46e5, #7c3aed);
      border: none;
      padding: 12px;
      border-radius: 8px;
      font-weight: 600;
      font-size: 15px;
    }

    .btn-primary:hover {
      opacity: 0.95;
    }

    .back-link {
      font-size: 14px;
      color: #2563eb;
      text-decoration: none;
    }

    .back-link:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>

  <div class="auth-card">

    <div class="logo-icon">
      <i class="bi bi-search"></i>
    </div>

    <div class="brand-name">Khojne Sathi</div>

    <h5 class="fw-bold mb-2">Forgot Password?</h5>
    <p class="text-muted small mb-4">
      Enter your registered email address to receive a verification code.
    </p>

    <form action="verify-otp.html">
      <div class="mb-3 text-start">
        <label class="form-label small fw-semibold">Email Address</label>
        <div class="input-group">
          <span class="input-group-text bg-light">
            <i class="bi bi-envelope"></i>
          </span>
          <input type="email" class="form-control" placeholder="your.email@example.com" required>
        </div>
      </div>

      <button type="submit" class="btn btn-primary w-100 mb-3">
        Send Verification Code
      </button>
    </form>

    <a href="login.html" class="back-link">
      ← Back to Login
    </a>

  </div>

</body>
</html>
