<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">

    <style>
        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #2563eb, #1e40af);
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: "Segoe UI", sans-serif;
        }

        .auth-card {
            background: #fff;
            border-radius: 18px;
            padding: 40px 35px;
            width: 100%;
            max-width: 460px;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.15);
            text-align: center;
        }

        .logo-icon {
            width: 52px;
            height: 52px;
            border-radius: 14px;
            background: #2563eb;
            color: #fff;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 12px;
            font-size: 22px;
        }

        .email-icon {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            background: #e0ebff;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 22px auto;
            color: #2563eb;
            font-size: 26px;
        }

        .otp-input {
            width: 48px;
            height: 52px;
            font-size: 22px;
            text-align: center;
            border-radius: 10px;
            border: 1px solid #d1d5db;
        }

        .otp-input:focus {
            border-color: #2563eb;
            box-shadow: 0 0 0 0.15rem rgba(37, 99, 235, 0.25);
        }

        .btn-primary {
            background: #d1d5db;
            border: none;
            border-radius: 10px;
            padding: 12px;
            font-weight: 600;
        }

        .btn-primary:enabled {
            background: linear-gradient(135deg, #2563eb, #7c3aed);
        }

        .resend-link {
            color: #9ca3af;
            text-decoration: none;
            pointer-events: none;
        }

        .resend-link.active {
            color: #2563eb;
            pointer-events: auto;
        }

        .back-link {
            color: #e5e7eb;
            text-decoration: none;
            font-weight: 500;
        }
    </style>
</head>
<body>

<div class="auth-card">

    <!-- Logo -->
    <div class="logo-icon">
        <i class="bi bi-search"></i>
    </div>
    <h4 class="fw-bold mb-3">Khojne Sathi</h4>

    <!-- Email Icon -->
    <div class="email-icon">
        <i class="bi bi-envelope-fill"></i>
    </div>

    <!-- Heading -->
    <h5 class="fw-semibold">Verify Your Email</h5>
    <p class="text-muted mb-1">We sent a password reset link to your email address</p>

    <!-- OTP Inputs -->

<!-- Back -->
<div class="position-fixed bottom-0 mb-4">
    <a href="login.html" class="back-link">
        <i class="bi bi-arrow-left"></i> Back to Login
    </a>
</div>

<!-- JavaScript -->
<script>
    const inputs = document.querySelectorAll(".otp-input");
    const verifyBtn = document.getElementById("verifyBtn");
    const timerEl = document.getElementById("timer");
    const resendLink = document.getElementById("resend");

    // OTP auto focus & button enable
    inputs.forEach((input, index) => {
        input.addEventListener("input", () => {
            if (input.value && index < inputs.length - 1) {
                inputs[index + 1].focus();
            }

            verifyBtn.disabled = [...inputs].some(i => i.value === "");
        });
    });

    // Countdown timer
    let timeLeft = 60;
    const countdown = setInterval(() => {
        timeLeft--;
        timerEl.textContent = timeLeft;

        if (timeLeft <= 0) {
            clearInterval(countdown);
            timerEl.textContent = "0";
            resendLink.classList.add("active");
        }
    }, 1000);
</script>

</body>
