<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Reset Password | Khojne Sathi</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">

    <style>
        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #2563eb, #1e40af);
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: "Segoe UI", sans-serif;
        }

        .auth-card {
            background: #fff;
            border-radius: 18px;
            padding: 40px 35px;
            width: 100%;
            max-width: 420px;
            box-shadow: 0 25px 50px rgba(0,0,0,0.15);
            text-align: center;
        }

        .logo-icon {
            width: 48px;
            height: 48px;
            border-radius: 12px;
            background: #e0ebff;
            color: #2563eb;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 10px;
            font-size: 20px;
        }

        .form-control {
            border-radius: 10px;
            padding: 12px 40px 12px 40px;
        }

        .input-icon {
            position: absolute;
            top: 50%;
            left: 12px;
            transform: translateY(-50%);
            color: #9ca3af;
        }

        .toggle-icon {
            position: absolute;
            top: 50%;
            right: 12px;
            transform: translateY(-50%);
            color: #9ca3af;
            cursor: pointer;
        }

        .password-rules {
            background: #f8fafc;
            border-radius: 12px;
            padding: 12px 15px;
            text-align: left;
            font-size: 13px;
        }

        .password-rules li {
            list-style: none;
            margin-bottom: 4px;
            color: #4b5563;
        }

        .password-rules i {
            color: #2563eb;
            margin-right: 6px;
        }

        .btn-primary {
            background: linear-gradient(135deg, #2563eb, #1d4ed8);
            border: none;
            border-radius: 12px;
            padding: 12px;
            font-weight: 600;
        }

        .back-link {
            color: #2563eb;
            text-decoration: none;
            font-size: 14px;
        }
    </style>
</head>
<body>

<div class="auth-card">

    <!-- Icon -->
    <div class="logo-icon">
        <i class="bi bi-shield-lock"></i>
    </div>

    <h5 class="fw-bold">Khojne Sathi</h5>

    <h6 class="fw-semibold mt-4">Create New Password</h6>
    <p class="text-muted small mb-4">
        Your new password must be strong and secure
    </p>

    <!-- New Password -->
    <div class="mb-3 position-relative">
        <i class="bi bi-lock input-icon"></i>
        <input type="password" class="form-control" placeholder="Enter your new password">
        <i class="bi bi-eye toggle-icon"></i>
    </div>

    <!-- Confirm Password -->
    <div class="mb-3 position-relative">
        <i class="bi bi-lock input-icon"></i>
        <input type="password" class="form-control" placeholder="Confirm your new password">
        <i class="bi bi-eye toggle-icon"></i>
    </div>

    <!-- Password Rules -->
    <div class="password-rules mb-4">
        <p class="fw-semibold mb-2">Password must contain:</p>
        <ul class="p-0 m-0">
            <li><i class="bi bi-check-circle"></i> At least 8 characters</li>
            <li><i class="bi bi-check-circle"></i> One uppercase letter</li>
            <li><i class="bi bi-check-circle"></i> One lowercase letter</li>
            <li><i class="bi bi-check-circle"></i> One number or special character</li>
        </ul>
    </div>

    <!-- Button -->
    <button class="btn btn-primary w-100 mb-3">
        Reset Password
    </button>

    <!-- Back -->
    <a href="login.html" class="back-link">
        <i class="bi bi-arrow-left"></i> Back to Login
    </a>

</div>

</body>
</html>
